<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>가계부</title>
<style>
:root{--a:#1D9E75;--al:#E1F5EE;--bg:#f8f9fa;--sf:#fff;--tx:#1a1a1a;--t2:#666;--bd:rgba(0,0,0,0.09);--r:14px}
@media(prefers-color-scheme:dark){:root{--bg:#0f0f0f;--sf:#1c1c1e;--tx:#f0f0f0;--bd:rgba(255,255,255,0.1)}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,sans-serif;height:100dvh;display:flex;flex-direction:column}
.topnav{background:var(--sf);padding:max(env(safe-area-inset-top),44px) 16px 8px;border-bottom:0.5px solid var(--bd)}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 16px;background:var(--sf)}
.metric{background:var(--bg);border-radius:10px;padding:8px;text-align:center;font-size:12px}
.val{font-weight:700}.inc{color:#A32D2D}.exp{color:#185FA5}
.body{flex:1;overflow-y:auto;padding:12px 16px}
.panel{display:none}.panel.active{display:block}
.add-form{background:var(--sf);border-radius:var(--r);padding:14px;margin-bottom:12px}
.type-toggle{display:flex;gap:6px;margin-bottom:10px}
.type-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--bd);font-weight:600;background:none;color:var(--t2)}
.type-btn.active.exp-btn{background:#E6F1FB;border-color:#378ADD;color:#185FA5}
.type-btn.active.inc-btn{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D}
.field{display:flex;flex-direction:column;gap:4px;flex:1;margin-bottom:8px}
.field label{font-size:11px;color:var(--t2)}
.field input,.field select{padding:10px;border:1px solid var(--bd);border-radius:10px;background:var(--bg);color:var(--tx);width:100%}
.add-btn{width:100%;padding:13px;background:var(--a);border:none;border-radius:10px;color:#fff;font-weight:700}
.bottom-bar{background:var(--sf);border-top:0.5px solid var(--bd);padding-bottom:env(safe-area-inset-bottom);display:flex}
.bot-tab{flex:1;padding:10px 0;display:flex;flex-direction:column;align-items:center;color:var(--t2);background:none;border:none}
.bot-tab.active{color:var(--a)}
.bot-tab svg{width:22px;height:22px;margin-bottom:2px;stroke:currentColor;fill:none;stroke-width:2}
.label{font-size:10px;font-weight:600}
</style>
</head>
<body>
<div class="topnav">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-weight:700;color:var(--a)">💰 가족 가계부</span>
        <button onclick="doLogout()" style="font-size:12px;color:var(--t2);background:none;border:none">로그아웃</button>
    </div>
    <div style="display:flex;justify-content:center;align-items:center;gap:15px">
        <button onclick="changeMonth(-1)" style="border:none;background:none;font-size:20px">‹</button>
        <span id="monthLabel" style="font-weight:600">2026년 3월</span>
        <button onclick="changeMonth(1)" style="border:none;background:none;font-size:20px">›</button>
    </div>
</div>
<div class="summary">
    <div class="metric"><div>수입</div><div class="val inc" id="totInc">₩0</div></div>
    <div class="metric"><div>지출</div><div class="val exp" id="totExp">₩0</div></div>
    <div class="metric"><div>잔액</div><div class="val" id="totBal">₩0</div></div>
</div>
<div class="body">
    <div id="p-record" class="panel active">
        <div class="add-form">
            <div class="type-toggle">
                <button class="type-btn exp-btn active" id="btnExp" onclick="setType('expense')">지출</button>
                <button class="type-btn inc-btn" id="btnInc" onclick="setType('income')">수입</button>
            </div>
            <div style="display:flex;gap:8px">
                <div class="field"><label>금액</label><input type="number" id="txAmt" placeholder="0"/></div>
                <div class="field"><label>날짜</label><input type="date" id="txDate"/></div>
            </div>
            <div class="field"><label>메모</label><input type="text" id="txNote" placeholder="내용 입력"/></div>
            <button class="add-btn" onclick="addTx()">추가하기</button>
        </div>
        <div id="txList"></div>
    </div>
    <div id="p-asset" class="panel"><div id="assetList"></div></div>
    <div id="p-chart" class="panel"><canvas id="mainChart"></canvas></div>
    <div id="p-settings" class="panel">설정 화면</div>
</div>
<div class="bottom-bar">
    <button class="bot-tab active" onclick="switchTab('record',this)"><svg viewBox="0 0 24 24"><path d="M12 5H7a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-5M18.5 2.5l3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><span class="label">기록</span></button>
    <button class="bot-tab" onclick="switchTab('asset',this)"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v11"/></svg><span class="label">자산</span></button>
    <button class="bot-tab" onclick="switchTab('chart',this)"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg><span class="label">분석</span></button>
    <button class="bot-tab" onclick="switchTab('settings',this)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span class="label">설정</span></button>
</div>

<script>
const $ = id => document.getElementById(id);
let type = 'expense';

const switchTab = (id, el) => {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.bot-tab').forEach(t => t.classList.remove('active'));
    $(`p-${id}`).classList.add('active');
    el.classList.add('active');
};

const setType = t => {
    type = t;
    $('btnExp').classList.toggle('active', t === 'expense');
    $('btnInc').classList.toggle('active', t === 'income');
};

const addTx = () => {
    const amt = $('txAmt').value, note = $('txNote').value;
    if(!amt) return alert('금액을 입력하세요');
    const item = document.createElement('div');
    item.innerHTML = `<div style="padding:10px;background:#fff;margin-bottom:8px;border-radius:10px;display:flex;justify-content:space-between">
        <span>${note || '항목'}</span><span class="${type==='income'?'inc':'exp'}">${type==='income'?'+':'-'}${Number(amt).toLocaleString()}원</span>
    </div>`;
    $('txList').prepend(item);
    $('txAmt').value = ''; $('txNote').value = '';
};

const init = () => {
    $('txDate').value = new Date().toISOString().split('T')[0];
    // 키보드 대응
    window.addEventListener('focusin', e => {
        if(e.target.tagName === 'INPUT') document.querySelector('.bottom-bar').style.display = 'none';
    });
    window.addEventListener('focusout', () => {
        setTimeout(() => document.querySelector('.bottom-bar').style.display = 'flex', 100);
    });
};

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
